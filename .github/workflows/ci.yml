name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugin/package-lock.json
      - name: Install Rokit
        run: |
          curl -fsSL https://raw.githubusercontent.com/rojo-rbx/rokit/main/scripts/install.sh | bash
          echo "$HOME/.rokit/bin" >> "$GITHUB_PATH"
      - name: Install pinned tools (rojo, lune)
        run: rokit install --no-trust-check
      - name: Build plugin
        working-directory: plugin
        run: |
          npm ci
          npx rbxtsc
      - name: Build rbxmx
        working-directory: plugin
        run: rojo build --output Tripwire.rbxmx
