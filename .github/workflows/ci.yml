name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo build --release

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugin/package-lock.json
      - name: Install Rokit
        run: |
          curl -fsSL https://raw.githubusercontent.com/rojo-rbx/rokit/main/scripts/install.sh | bash
          echo "$HOME/.rokit/bin" >> "$GITHUB_PATH"
      - name: Install pinned tools (rojo, lune)
        run: rokit install --no-trust-check
      - name: Build plugin
        working-directory: plugin
        run: |
          npm ci
          npx rbxtsc
      - name: Build rbxmx
        working-directory: plugin
        run: rojo build --output Tripwire.rbxmx

  sample-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sample-game/package-lock.json
      - name: Build sample game
        working-directory: sample-game
        run: |
          npm ci
          npx rbxtsc
