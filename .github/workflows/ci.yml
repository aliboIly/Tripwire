name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: cargo fmt --check
      # clippy compiles the crate in debug, so it doubles as the build gate; a
      # separate --release build here would recompile the whole tree (swc included)
      # a second time for no extra coverage.
      - run: cargo clippy --all-targets -- -D warnings

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugin/package-lock.json
      - name: Install Rokit
        run: |
          # raw.githubusercontent occasionally 403s a shared runner IP; retry the fetch.
          for attempt in 1 2 3; do
            curl -fsSL https://raw.githubusercontent.com/rojo-rbx/rokit/main/scripts/install.sh -o /tmp/rokit-install.sh && break
            echo "rokit install script download failed (attempt $attempt); retrying"; sleep 10
          done
          bash /tmp/rokit-install.sh
          echo "$HOME/.rokit/bin" >> "$GITHUB_PATH"
      - name: Install pinned tools (rojo, lune)
        run: rokit install --no-trust-check
      - name: Build plugin
        working-directory: plugin
        run: |
          npm ci
          npx rbxtsc
      - name: Build rbxmx
        working-directory: plugin
        run: rojo build --output Tripwire.rbxmx

  sample-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sample-game/package-lock.json
      - name: Build sample game
        working-directory: sample-game
        run: |
          npm ci
          npx rbxtsc
