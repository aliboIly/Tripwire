name: Security review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Build server
        working-directory: server
        run: cargo build
      - name: Run the security review
        run: server/target/debug/tripwire-server review sample-game/src > review.md
      - name: Comment on the pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        # Keep a single sticky comment: edit the bot's last one, or create it the first time.
        run: gh pr comment "$PR" --body-file review.md --edit-last || gh pr comment "$PR" --body-file review.md
